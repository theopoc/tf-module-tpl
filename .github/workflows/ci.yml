name: CI

on:
  push:
    paths-ignore:
      - '**.md'
      - '.gitignore'
  workflow_dispatch:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render:
    name: Render (${{ matrix.ci_provider }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        ci_provider: [github, gitlab]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Render template for mise cache
        run: |
          uv run copier copy . /tmp/mise-render \
            --defaults \
            --trust \
            --skip-tasks \
            --data module_name=terraform-aws-example \
            --data module_description="Example module" \
            --data author_name="Test Author" \
            --data ci_provider=${{ matrix.ci_provider }} \
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
        with:
          working_directory: /tmp/mise-render
          cache: true
      - name: Cache npm dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('template/*package.json*.jinja', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Configure git
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: Render template with tasks
        run: |
          uv run copier copy . /tmp/rendered \
            --defaults \
            --trust \
            --data module_name=terraform-aws-example \
            --data module_description="Example module" \
            --data author_name="Test Author" \
            --data ci_provider=${{ matrix.ci_provider }} \
      - name: Upload rendered artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rendered-${{ matrix.ci_provider }}
          path: /tmp/rendered
          include-hidden-files: true
          retention-days: 1

  test-pipeline:
    name: Test Pipeline (${{ matrix.ci_provider }})
    runs-on: ubuntu-24.04
    needs: render
    strategy:
      matrix:
        ci_provider: [github, gitlab]
    steps:
      - name: Download rendered artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: rendered-${{ matrix.ci_provider }}
          path: /tmp/rendered

      - name: Install act
        if: matrix.ci_provider == 'github'
        run: |
          curl --proto '=https' --tlsv1.2 -sSfL \
            https://github.com/nektos/act/releases/download/v0.2.74/act_Linux_x86_64.tar.gz \
            | sudo tar xz -C /usr/local/bin act

      - name: Test generated lint.yml with act
        if: matrix.ci_provider == 'github'
        working-directory: /tmp/rendered
        run: |
          git remote add origin https://github.com/myorg/terraform-aws-example.git
          act push \
            -W .github/workflows/lint.yml \
            -j lint \
            -P ubuntu-latest=catthehacker/ubuntu:act-latest \
            --no-cache-server \
            --artifact-server-path /tmp/act-artifacts

      - name: Install gitlab-ci-local
        if: matrix.ci_provider == 'gitlab'
        run: npm install -g gitlab-ci-local

      - name: Cache npm dependencies
        if: matrix.ci_provider == 'gitlab'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('template/*package.json*.jinja', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Preview with gitlab-ci-local
        if: matrix.ci_provider == 'gitlab'
        working-directory: /tmp/rendered
        run: gitlab-ci-local --preview

      - name: Test generated .gitlab-ci.yml with gitlab-ci-local
        if: matrix.ci_provider == 'gitlab'
        working-directory: /tmp/rendered
        run: gitlab-ci-local parse-mise-versions tf-fmt tflint trivy tf-validate tf-docs --pull-policy if-not-present --timestamps
