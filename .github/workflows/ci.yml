name: CI

on:
  push:
    branches-ignore:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'renovate.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-test:
    name: Render Test (${{ matrix.ci_provider }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        ci_provider: [github, gitlab]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Render template for mise cache
        run: |
          uv run copier copy . /tmp/mise-render \
            --defaults \
            --trust \
            --skip-tasks \
            --data module_name=terraform-aws-example \
            --data module_description="Example module" \
            --data author_name="Test Author" \
            --data ci_provider=${{ matrix.ci_provider }} \
            --data github_repo=myorg/terraform-aws-example \
            --data gitlab_repo=myorg/terraform-aws-example
      - uses: jdx/mise-action@v3
        with:
          working_directory: /tmp/mise-render
          cache: true
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('template/*package.json*.jinja', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-
      - name: Configure git
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: Render template with tasks
        run: |
          uv run copier copy . /tmp/rendered \
            --defaults \
            --trust \
            --data module_name=terraform-aws-example \
            --data module_description="Example module" \
            --data author_name="Test Author" \
            --data ci_provider=${{ matrix.ci_provider }} \
            --data github_repo=myorg/terraform-aws-example \
            --data gitlab_repo=myorg/terraform-aws-example

      - name: Install act
        if: matrix.ci_provider == 'github'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/nektos/act/master/install.sh | sudo bash

      - name: Test generated lint.yml with act
        if: matrix.ci_provider == 'github'
        working-directory: /tmp/rendered
        run: |
          act push \
            -W .github/workflows/lint.yml \
            -j lint \
            -P ubuntu-latest=catthehacker/ubuntu:act-latest \
            --no-cache-server \
            --artifact-server-path /tmp/act-artifacts

      - name: Test generated .gitlab-ci.yml with gitlab-ci-local
        if: matrix.ci_provider == 'gitlab'
        working-directory: /tmp/rendered
        run: |
          npm install -g gitlab-ci-local
          gitlab-ci-local --list
