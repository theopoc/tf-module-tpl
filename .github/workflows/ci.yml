name: CI

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  render-test:
    name: Render Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Render template for mise cache
        run: |
          uv run copier copy . /tmp/mise-render \
            --defaults \
            --trust \
            --skip-tasks \
            --data module_name=terraform-aws-example \
            --data module_description="Example module" \
            --data author_name="Test Author" \
            --data ci_provider=github \
            --data github_repo=myorg/terraform-aws-example
      - uses: jdx/mise-action@v3
        with:
          working_directory: /tmp/mise-render
          cache: true
      - name: Configure git
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: Render template with tasks
        run: |
          uv run copier copy . /tmp/rendered \
            --defaults \
            --trust \
            --data module_name=terraform-aws-example \
            --data module_description="Example module" \
            --data author_name="Test Author" \
            --data ci_provider=github \
            --data github_repo=myorg/terraform-aws-example
