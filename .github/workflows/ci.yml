name: CI

on:
  push:

jobs:
  render-test:
    name: Render Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
        with:
          install: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install copier
        run: pip install copier
      - name: Configure git
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"
      - name: Render template with tasks
        run: |
          copier copy . /tmp/rendered \
            --defaults \
            --trust \
            --data module_name=terraform-aws-example \
            --data module_description="Example module" \
            --data author_name="Test Author" \
            --data ci_provider=github \
            --data github_repo=myorg/terraform-aws-example
