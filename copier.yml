_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml
_env:
  MISE_TRUSTED_CONFIG_PATHS: "."
_tasks:
  - ["mise", "--version"]
  - ["git", "init", "--initial-branch=main"]
  - ["mise", "trust", "-qa"]
  - ["mise", "install"]
  - command: ["terraform-docs", "markdown", "table", "--output-file=README.md", "--output-mode=inject", "."]
    when: "{{ use_terraform_docs }}"
  - command: ["npm", "install"]
    when: "{{ use_semantic_release }}"
  - ["git", "add", "."]
  - ["git", "commit", "-m", "initial: terraform module scaffold"]
  - command: ["pre-commit", "autoupdate"]
    when: "{{ use_pre_commit }}"
  - command: ["pre-commit", "install"]
    when: "{{ use_pre_commit }}"
  - command: ["pre-commit", "run", "-a"]
    when: "{{ use_pre_commit }}"

module_name:
  type: str
  help: Module name (e.g., terraform-aws-mymodule)

module_description:
  type: str
  help: Short description of the module

terraform_min_version:
  type: str
  default: "1.9"
  help: Minimum Terraform version required

author_name:
  type: str
  help: Author name

ci_provider:
  type: str
  help: Which CI/CD provider do you want to use?
  choices:
    - "github"
    - "gitlab"
  default: "github"

github_repo:
  type: str
  help: GitHub repository (e.g., myorg/terraform-aws-mymodule)
  when: "{{ ci_provider == 'github' }}"

gitlab_repo:
  type: str
  help: GitLab repository (e.g., myorg/terraform-aws-mymodule)
  when: "{{ ci_provider == 'gitlab' }}"

use_aws_provider:
  type: bool
  default: false
  help: Do you want to add the AWS provider?

aws_provider_version:
  type: str
  default: "~> 5.0"
  help: AWS provider version constraint
  when: "{{ use_aws_provider }}"

use_awscc_provider:
  type: bool
  default: false
  help: Do you want to add the AWS Cloud Control provider?

awscc_provider_version:
  type: str
  default: "~> 1"
  help: AWS Cloud Control provider version constraint
  when: "{{ use_awscc_provider }}"

use_tflint:
  type: bool
  default: true
  help: Enable TFLint for Terraform linting

use_pre_commit:
  type: bool
  default: true
  help: Enable pre-commit hooks for code quality

use_semantic_release:
  type: bool
  default: true
  help: Enable semantic-release for automated versioning and changelog

enable_pipeline:
  type: bool
  default: true
  help: Enable CI/CD pipeline configuration

use_examples:
  type: bool
  default: true
  help: Generate an examples/ directory with usage examples

use_terraform_docs:
  type: bool
  default: true
  help: Enable terraform-docs for automatic documentation generation
