_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml
_env:
  MISE_TRUSTED_CONFIG_PATHS: "."
_tasks:
  - ["mise", "--version"]
  - ["git", "init", "--initial-branch=main"]
  - ["mise", "trust", "-qa"]
  - ["mise", "install"]
  - ["terraform-docs", "markdown", "table", "--output-file=README.md", "--output-mode=inject", "."]
  - ["npm", "install"]
  - ["npx", "husky", "install"]
  - ["git", "config", "--unset-all", "core.hooksPath"]
  - ["git", "add", "."]
  - ["git", "commit", "-m", "initial: terraform module scaffold"]
  - ["pre-commit", "autoupdate"]
  - ["pre-commit", "install"]
  - ["pre-commit", "run", "-a"]

module_name:
  type: str
  help: Module name (e.g., terraform-aws-mymodule)

module_description:
  type: str
  help: Short description of the module

terraform_min_version:
  type: str
  default: "1.9"
  help: Minimum Terraform version required

author_name:
  type: str
  help: Author name

ci_provider:
  type: str
  help: Which CI/CD provider do you want to use?
  choices:
    - "github"
    - "gitlab"
  default: "github"

github_repo:
  type: str
  help: GitHub repository (e.g., myorg/terraform-aws-mymodule)
  when: "{{ ci_provider == 'github' }}"

gitlab_repo:
  type: str
  help: GitLab repository (e.g., myorg/terraform-aws-mymodule)
  when: "{{ ci_provider == 'gitlab' }}"

use_aws_provider:
  type: bool
  default: false
  help: Do you want to add the AWS provider?

aws_provider_version:
  type: str
  default: "~> 5.0"
  help: AWS provider version constraint
  when: "{{ use_aws_provider }}"

use_awscc_provider:
  type: bool
  default: false
  help: Do you want to add the AWS Cloud Control provider?

awscc_provider_version:
  type: str
  default: "~> 0.0"
  help: AWS Cloud Control provider version constraint
  when: "{{ use_awscc_provider }}"
