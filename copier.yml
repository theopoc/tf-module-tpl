_min_copier_version: "9"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml
_env:
  MISE_TRUSTED_CONFIG_PATHS: "."
_tasks:
  - ["mise", "--version"]
  - ["git", "init", "--initial-branch=main"]
  - ["mise", "trust", "-qa"]
  - ["mise", "install"]
  - command: ["terraform-docs", "."]
    when: "{{ use_terraform_docs }}"
  - command: ["npm", "install"]
    when: "{{ use_semantic_release }}"
  - command: ["pre-commit", "autoupdate"]
    when: "{{ use_pre_commit }}"
  - ["git", "add", "."]
  - ["git", "commit", "-m", "initial: terraform module scaffold"]
  - command: ["pre-commit", "install"]
    when: "{{ use_pre_commit }}"
  - command: ["pre-commit", "run", "-a"]
    when: "{{ use_pre_commit }}"

module_name:
  type: str
  help: Module name (e.g., terraform-aws-mymodule)
  validator: "{% if module_name | trim | length < 3 %}Module name must be at least 3 characters.{% endif %}"

module_description:
  type: str
  help: Short description of the module
  default: "A Terraform module for {{ module_name }}"
  validator: "{% if module_description | trim | length < 3 %}Module description must be at least 3 characters.{% endif %}"

terraform_min_version:
  type: str
  default: "1.9.0"
  help: Minimum Terraform version required

author_name:
  type: str
  help: Author name
  validator: "{% if author_name | trim | length < 2 %}Author name must be at least 2 characters.{% endif %}"

enable_pipeline:
  type: bool
  default: true
  help: Enable CI/CD pipeline configuration

ci_provider:
  type: str
  help: Which CI/CD provider do you want to use?
  choices:
    - "github"
    - "gitlab"
  default: "github"
  when: "{{ enable_pipeline }}"

github_repo:
  type: str
  help: GitHub repository (e.g., myorg/terraform-aws-mymodule)
  when: "{{ enable_pipeline and ci_provider == 'github' }}"
  validator: "{% if github_repo | trim | length < 3 %}GitHub repository must be at least 3 characters.{% endif %}"

gitlab_repo:
  type: str
  help: GitLab repository (e.g., myorg/terraform-aws-mymodule)
  when: "{{ enable_pipeline and ci_provider == 'gitlab' }}"
  validator: "{% if gitlab_repo | trim | length < 3 %}GitLab repository must be at least 3 characters.{% endif %}"

providers:
  type: yaml
  help: Which Terraform providers do you want to add?
  multiselect: true
  choices:
    AWS: aws
    "AWS Cloud Control": awscc
  default: []

aws_provider_version:
  type: str
  default: "~> 5.0"
  help: AWS provider version constraint
  when: "{{ 'aws' in providers }}"

awscc_provider_version:
  type: str
  default: "~> 1"
  help: AWS Cloud Control provider version constraint
  when: "{{ 'awscc' in providers }}"

null_provider_version:
  type: str
  default: "~> 3.0"
  help: Null provider version constraint
  when: false

use_tflint:
  type: bool
  default: true
  help: Enable TFLint for Terraform linting

use_trivy:
  type: bool
  default: true
  help: Enable Trivy for security scanning

use_pre_commit:
  type: bool
  default: true
  help: Enable pre-commit hooks for code quality

use_semantic_release:
  type: bool
  default: true
  help: Enable semantic-release for automated versioning and changelog

use_examples:
  type: bool
  default: true
  help: Generate an examples/ directory with usage examples

use_terraform_docs:
  type: bool
  default: true
  help: Enable terraform-docs for automatic documentation generation
